name: LinkedIn Auto Post

on:
  schedule:
    # Mon, Wed, Fri at 10:00 AM EST (15:00 UTC)
    - cron: '0 15 * * 1'
    - cron: '0 15 * * 3'
    - cron: '0 15 * * 5'

  # Allows manual trigger from GitHub Actions tab (for testing)
  workflow_dispatch:

jobs:
  generate-and-post:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and publish LinkedIn post
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          LINKEDIN_ACCESS_TOKEN: ${{ secrets.LINKEDIN_ACCESS_TOKEN }}
          LINKEDIN_USER_URN: ${{ secrets.LINKEDIN_USER_URN }}
        run: python generate_post.py
